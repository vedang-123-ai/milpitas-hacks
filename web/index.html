<!doctype html>
<!--
  web/index.html — app shell + script load order
  Owner: P4 (Integration). This is the ONE shared wiring file. Keep edits to the
  <head> assets, the presentational markup, and the <script> load order below.

  The VISIBLE screen is the "see the invisible game" display for sighted
  facilitators and judges — it mirrors the audio (the blind player's real UI) by
  lighting the Braille dots live from GameState. All logic lives in the modules.

  Load order (globals defined before consumers):
    config.js -> audio/* -> voice/* -> game/* -> ui.js -> input/* -> main.js
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DotRace — Braille readiness</title>

  <!-- Distinctive type; degrades to refined local fallbacks fully offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="ui.css" />
</head>
<body>
  <div class="shell">

    <!-- ── header ──────────────────────────────────────────────────────── -->
    <header class="masthead">
      <div class="wordmark">
        <h1>D<span class="dot-i">o</span>tRace</h1>
        <span class="tag">braille readiness</span>
      </div>
      <div class="pills">
        <span class="pill"><span class="key">mode</span> <b id="mode-val">—</b></span>
        <span class="pill"><span class="key">level</span> <b id="diff-val">—</b></span>
        <span class="pill timer" id="timer-pill" hidden><span class="key">time</span> <b id="timer-val">—</b></span>
      </div>
    </header>

    <!-- ── the audible prompt, made visible ────────────────────────────── -->
    <section class="prompt-block">
      <div class="prompt-eyebrow">now playing</div>
      <p id="prompt">Put on headphones — press a key or say a command.</p>
      <div class="target-chip">target <span class="glyph" id="target-glyph">—</span></div>
    </section>

    <!-- ── two Braille cells (left = P1, right = P2; mirrors audio pan) ──── -->
    <main class="stage">
      <section class="cell" id="cell-1" data-player="1">
        <span class="notch" aria-hidden="true"></span>
        <div class="cell-head">
          <span class="who">Player 1</span>
          <span class="score" id="score-1">0</span>
        </div>
        <div class="grid" id="grid-1" aria-hidden="true"></div>
      </section>

      <section class="cell" id="cell-2" data-player="2">
        <span class="notch" aria-hidden="true"></span>
        <div class="cell-head">
          <span class="who">Player 2</span>
          <span class="score" id="score-2">0</span>
        </div>
        <div class="grid" id="grid-2" aria-hidden="true"></div>
      </section>
    </main>

    <div class="ticker" id="ticker">ready</div>

    <!-- ── command bar + signal log ────────────────────────────────────── -->
    <section class="console">
      <div class="cmdbar" id="cmdbar">
        <span class="lead"><span class="mic" aria-hidden="true"></span> say or type</span>
        <!-- Always-focused dictation target for the optional Wispr Flow path -->
        <input id="voice-input" autofocus autocomplete="off" spellcheck="false"
               aria-label="voice command input"
               placeholder="one player · two player · easy · hard · rapid fire · start · repeat" />
      </div>

      <details class="logwrap">
        <summary>signal log <span class="chev">›</span></summary>
        <pre id="log" aria-hidden="true"></pre>
      </details>
    </section>

  </div>

  <!-- config first -->
  <script src="config.js"></script>
  <!-- sensory layer (defines globals: Audio, Speak, Voice) -->
  <script src="audio/earcons.js"></script>
  <script src="audio/audio.js"></script>
  <script src="voice/speak.js"></script>
  <script src="voice/recognition.js"></script>
  <script src="voice/wispr-hook.js"></script>
  <!-- game logic -->
  <script src="game/state.js"></script>
  <script src="game/modes/free-explore.js"></script>
  <script src="game/modes/find-target.js"></script>
  <script src="game/modes/race.js"></script>
  <script src="game/modes/rapid-fire.js"></script>
  <script src="game/engine.js"></script>
  <!-- presentational display driver (reads GameState; defines global UI) -->
  <script src="ui.js"></script>
  <!-- input sources (real hub vs mock) -->
  <script src="input/hub-source.js"></script>
  <script src="input/mock-source.js"></script>
  <script src="../mocks/keyboard-emitter.js"></script>
  <!-- integration entry: picks input source, wires everything -->
  <script src="main.js"></script>
</body>
</html>
